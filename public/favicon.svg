<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Outer rim gradient -->
    <linearGradient id="rimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#78350F" />
    </linearGradient>
    
    <!-- Inner face gradient -->
    <linearGradient id="faceGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>

    <!-- Inner edge -->
    <linearGradient id="innerEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#FDE68A" />
    </linearGradient>

    <!-- Text gradient (shiny V) -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#FDE68A" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer rim (border) -->
  <circle cx="50" cy="50" r="48" fill="url(#rimGradient)" filter="url(#drop-shadow)"/>
  
  <!-- Inner coin face -->
  <circle cx="50" cy="50" r="42" fill="url(#faceGradient)" />
  
  <!-- Inner edge/ridge -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#innerEdge)" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- The V -->
  <text x="50" y="70" font-family="'Outfit', system-ui, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#textGradient)" style="filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.4));">V</text>
</svg>